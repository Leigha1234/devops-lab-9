---
- name: Stage 1 - Launch or Find Staging EC2 Instance
  hosts: localhost
  connection: local
  vars:
    instance_name: Flask_Running_App_Staging
    key_name: flask_running_app_staging_key
    instance_type: t2.medium
    security_group: staging_sg  # Updated to match your AWS screenshot
    image_id: ami-0866a3c8686eaeeba
    region: us-east-1
    volume_size: 32

  tasks:
    - name: Launch T2 medium instance on EC2
      amazon.aws.ec2_instance:
        name: "{{ instance_name }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        security_group: "{{ security_group }}"
        image_id: "{{ image_id }}"
        region: "{{ region }}"
        wait: yes
        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_size: "{{ volume_size }}"
              delete_on_termination: true
      register: flask_running_app_staging_instance

    - name: Add new instance to host group via its public IP address
      add_host:
        hostname: "{{ flask_running_app_staging_instance.instances[0].public_ip_address }}"
        groupname: ec2_staging
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    - name: Wait for SSH to come up
      wait_for:
        host: "{{ flask_running_app_staging_instance.instances[0].public_ip_address }}"
        port: 22
        delay: 20
        timeout: 320
        state: started

- name: Stage 2 - Install DuckDNS and Docker on the Staging EC2 Instance
  hosts: ec2_staging
  vars:
    remote_ec2_user: ubuntu
  remote_user: "{{ remote_ec2_user }}"
  become: yes
  become_method: sudo

  tasks:
    # --------- Setup DuckDNS on the staging instance ---------
    - name: Ensure curl is installed
      package:
        name: curl
        state: present

    - name: Create duckdns directory
      file:
        path: "/home/{{ remote_ec2_user }}/duckdns"
        state: directory
        mode: '0755'
        owner: "{{ remote_ec2_user }}"

    - name: Create the duck.sh script
      copy:
        dest: "/home/{{ remote_ec2_user }}/duckdns/duck.sh"
        mode: '0700'
        owner: "{{ remote_ec2_user }}"
        content: |
          #!/bin/bash
          echo url="https://www.duckdns.org/update?domains={{ duckdns_domain }}&token={{ duckdns_api_token }}&ip=" | curl -k -o /home/{{ remote_ec2_user }}/duckdns/duck.log -K -

    - name: Create the cron job to run every 5 minutes
      cron:
        name: "DuckDNS Update"
        minute: "*/5"
        user: "{{ remote_ec2_user }}"
        job: "/home/{{ remote_ec2_user }}/duckdns/duck.sh >/dev/null 2>&1"

    - name: Run the script for the first time
      become_user: "{{ remote_ec2_user }}"
      command: "/home/{{ remote_ec2_user }}/duckdns/duck.sh"
      changed_when: true

    # --------- Install Docker on the staging instance ---------
    - name: Add the Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Update apt packages and install docker-ce
      apt:
        name: docker-ce
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ remote_ec2_user }}"
        groups: docker
        append: yes

    - name: Install Python kubernetes module for ansible
      apt:
        name: python3-kubernetes
        state: present

    # --------- Install Minikube and kubectl ---------
    - name: Download Minikube
      get_url:
        url: https://github.com/kubernetes/minikube/releases/latest/download/minikube-linux-amd64
        dest: /home/{{ remote_ec2_user }}/minikube-linux-amd64
        mode: '0755'

    - name: Install Minikube
      shell: install /home/{{ remote_ec2_user }}/minikube-linux-amd64 /usr/local/bin/minikube && rm /home/{{ remote_ec2_user }}/minikube-linux-amd64

    - name: Download kubectl
      shell: curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"

    - name: Install kubectl
      shell: install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

    - name: Start Minikube
      become_user: "{{ remote_ec2_user }}"
      shell: minikube start --driver=docker --force
      register: minikube_start

- name: Stage 3 - Verify DuckDNS resolution from Localhost
  hosts: localhost
  connection: local
  tasks:
    - name: Get the EC2 IP from the previous stage
      set_fact:
        ec2_ip: "{{ flask_running_app_staging_instance.instances[0].public_ip_address }}"

    - name: Check what IP DuckDNS is pointing to
      shell: "dig +short {{ duckdns_domain }}.duckdns.org"
      register: dns_ip
      until: dns_ip.stdout == ec2_ip
      retries: 15
      delay: 20
      changed_when: false

    - name: Final Result
      debug:
        msg: "Success! {{ duckdns_domain }}.duckdns.org is now pointing to {{ ec2_ip }}"